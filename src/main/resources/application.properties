spring.application.name=auth-service
server.port=8081

# Database — credentials are embedded in DB_URL (Supabase JDBC format)
spring.datasource.url=${DB_URL}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiry-ms=86400000

# Account service (for registration delegation)
account.service.url=${ACCOUNT_SERVICE_URL:http://account-service:8082}

# Actuator health probe
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Disable Spring Security's default login page (we handle auth ourselves)
spring.security.user.password=disabled
